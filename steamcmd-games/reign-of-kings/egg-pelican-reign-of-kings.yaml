      # Setup Envs
      chown -R root:root /mnt
      export HOME=/mnt/server

      ## check is steamuser is set
      if [ "${STEAM_USER}" == "" ]; then
          echo -e "steam user is not set.\n"
          echo -e "Using anonymous user.\n"
          STEAM_USER=anonymous
          STEAM_PASS=""
          STEAM_AUTH=""
      fi

      ## when steam_user is set, use DepotDownloader, if its anonymous, use steamcmd
      if [ "${STEAM_USER}" == "anonymous" ]; then
          ## download and install steamcmd
          cd /tmp
          mkdir -p /mnt/server/steamcmd
          curl -sSL -o steamcmd.tar.gz https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
          tar -xzvf steamcmd.tar.gz -C /mnt/server/steamcmd
          mkdir -p /mnt/server/steamapps # Fix steamcmd disk write error when this folder is missing
          cd /mnt/server/steamcmd

          ## install game using steamcmd
          echo -e "${BLUE}-------------------------------------------------${NC}"
          echo -e "${YELLOW}install game using steamcmd. please wait...${NC}"
          echo -e "${BLUE}-------------------------------------------------${NC}"

          ./steamcmd.sh +force_install_dir /mnt/server +login ${STEAM_USER} ${STEAM_PASS} ${STEAM_AUTH} $( [[ "${WINDOWS_INSTALL}" == "1" ]] && printf %s '+@sSteamCmdForcePlatformType windows' ) $( [[ "${STEAM_SDK}" == "1" ]] && printf %s '+app_update 1007' ) +app_update ${STEAM_APPID} $( [[ -z ${STEAM_BETAID} ]] || printf %s "-beta ${STEAM_BETAID}" ) $( [[ -z ${STEAM_BETAPASS} ]] || printf %s "-betapassword ${STEAM_BETAPASS}" ) ${INSTALL_FLAGS} validate +quit
          echo -e "${GREEN}..done..${NC}"

          ## set up 32 bit libraries
          mkdir -p /mnt/server/.steam/sdk32
          cp -v linux32/steamclient.so ../.steam/sdk32/steamclient.so

          ## set up 64 bit libraries
          mkdir -p /mnt/server/.steam/sdk64
          cp -v linux64/steamclient.so ../.steam/sdk64/steamclient.so
      else
          echo -e "${BLUE}-------------------------------------------------${NC}"
          echo -e "${YELLOW}download and install DepotDownloader. please wait...${NC}"
          echo -e "${BLUE}-------------------------------------------------${NC}"
          ## download DepotDownloader
          cd $HOME
          curl -sLOJ $(curl -s https://api.github.com/repos/SteamRE/DepotDownloader/releases/latest | grep browser_download_url | cut -d\" -f4 | egrep linux-x64.zip)
          unzip -o DepotDownloader-linux-x64.zip -d /mnt/server
          chmod +x /mnt/server/DepotDownloader
          rm -f /mnt/server/DepotDownloader-linux-x64.zip
          echo -e "${GREEN}..done..${NC}"

          echo -e "${BLUE}-------------------------------------------------${NC}"
          echo -e "${YELLOW}Depotdonloader Version: ${. /$HOME/DepotDownloader --version}${NC}"
          echo -e "${BLUE}-------------------------------------------------${NC}"

          ## install game using DepotDownloader
          echo -e "${BLUE}-------------------------------------------------${NC}"
          echo -e "${YELLOW}downloading game using DepotDownloader. please wait...${NC}"
          echo -e "${BLUE}-------------------------------------------------${NC}"

          ./DepotDownloader -dir /mnt/server $( [[ -z ${STEAM_USER} ]] || printf %s "-username ${STEAM_USER} -password ${STEAM_PASS} -remember-password" ) $( [[ "${WINDOWS_INSTALL}" == "1" ]] && printf %s '-os windows' ) -app ${STEAM_APPID} $( [[ -z ${STEAM_BETAID} ]] || printf %s "-beta ${STEAM_BETAID}" ) $( [[ -z ${STEAM_BETAPASS} ]] || printf %s "-betapassword ${STEAM_BETAPASS}" ) -validate
          echo -e "${GREEN}..done..${NC}"
          mkdir -p /mnt/server/.steam/sdk64
          ./DepotDownloader -dir /mnt/server/.steam/sdk64 $( [[ "${WINDOWS_INSTALL}" == "1" ]] && printf %s '-os windows' ) -app 1007
          chmod +x $HOME/*

          ## install game using DepotDownloader
          echo -e "${BLUE}-------------------------------------------------${NC}"
          echo -e "${YELLOW}installing new server. please wait...${NC}"
          echo -e "${BLUE}-------------------------------------------------${NC}"

      fi

      ## add below your custom commands if needed

