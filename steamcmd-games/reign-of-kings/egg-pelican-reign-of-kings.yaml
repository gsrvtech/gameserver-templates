      ## install end
      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${GREEN}Installation completed...${NC}"
      echo -e "${GREEN}Find my Egg usefull? Spend me a Coffee:${NC}"
      echo -e "${GREEN}https://donate.goover.dev${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"
