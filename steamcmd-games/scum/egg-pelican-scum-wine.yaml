scripts:
  installation:
    script: |-
      #!/bin/bash
      # THIS EGG IS LICENCED UNDER AGPLv3
      #
      clear
      RED='\033[0;31m'
      GREEN='\033[0;32m'
      YELLOW='\033[1;33m'
      BLUE='\033[0;34m'
      NC='\033[0m'

      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${YELLOW}SCUM Installscript${NC}"
      echo -e "${YELLOW}Egg by gOOvER (https://discord.goover.dev) | License: AGPLv3${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"

      # Setup Envs
      chown -R root:root /mnt
      export HOME=/mnt/server

      ## check is steamuser is set
      if [ "${STEAM_USER}" == "" ]; then
          echo -e "steam user is not set.\n"
          echo -e "Using anonymous user.\n"
          STEAM_USER=anonymous
          STEAM_PASS=""
          STEAM_AUTH=""
      fi

      ## if steam_user is set, use DepotDownloader, if its anonymous, use steamcmd
      #if [ "${STEAM_USER}" == "anonymous" ]; then
          ## download and install steamcmd
          cd /tmp
          mkdir -p /mnt/server/steamcmd
          curl -sSL -o steamcmd.tar.gz https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
          tar -xzvf steamcmd.tar.gz -C /mnt/server/steamcmd
          mkdir -p /mnt/server/steamapps # Fix steamcmd disk write error when this folder is missing
          cd /mnt/server/steamcmd

          ## install game using steamcmd
          echo -e "${BLUE}-------------------------------------------------${NC}"
          echo -e "${YELLOW}install game using steamcmd. please wait...${NC}"
          echo -e "${BLUE}-------------------------------------------------${NC}"

          ./steamcmd.sh +force_install_dir /mnt/server +login ${STEAM_USER} ${STEAM_PASS} ${STEAM_AUTH} $( [[ "${WINDOWS_INSTALL}" == "1" ]] && printf %s '+@sSteamCmdForcePlatformType windows' ) $( [[ "${STEAM_SDK}" == "1" ]] && printf %s '+app_update 1007' ) +app_update ${STEAM_APPID} $( [[ -z ${STEAM_BETAID} ]] || printf %s "-beta ${STEAM_BETAID}" ) $( [[ -z ${STEAM_BETAPASS} ]] || printf %s "-betapassword ${STEAM_BETAPASS}" ) ${INSTALL_FLAGS} validate +quit
          echo -e "${GREEN}..done..${NC}"

          ## set up 32 bit libraries
          mkdir -p /mnt/server/.steam/sdk32
          cp -v linux32/steamclient.so ../.steam/sdk32/steamclient.so

          ## set up 64 bit libraries
          mkdir -p /mnt/server/.steam/sdk64
          cp -v linux64/steamclient.so ../.steam/sdk64/steamclient.so

      ## add below your custom commands if needed

      FILE="$HOME/SCUM/Saved/Config/WindowsServer/ServerSettings.ini"
      if [ -f "$FILE" ]; then
        echo -e "${BLUE}-------------------------------------------------${NC}"
        echo -e "${GREEN} $FILE found.${NC}"
        echo -e "${BLUE}-------------------------------------------------${NC}"
      else
        echo -e "${BLUE}-------------------------------------------------${NC}"
        echo -e "${RED} $FILE not found. copy default...${NC}"
        echo -e "${BLUE}-------------------------------------------------${NC}"
        cd $HOME
        mkdir -p $HOME/SCUM/Saved/Config/WindowsServer/
        curl -sSL -o "ServerSettings.ini" https://raw.githubusercontent.com/gsrvtech/gameserver-templates/refs/heads/main/steamcmd-games/scum/config/ServerSettings.ini
        echo -e "${GREEN}..done..${NC}"
      fi

      ## Proton fix for Version 9.27 and above
      DIR="$HOME/.config/protonfixes"
      if [ ! -d "$DIR" ]; then
          echo -e "${BLUE}-------------------------------------------------${NC}"
          echo -e "${RED} The directory $DIR does not exist. Creating it now...${NC}"
          echo -e "${BLUE}-------------------------------------------------${NC}"
          mkdir -p "$DIR"
      else
          echo -e "${BLUE}-------------------------------------------------${NC}"
          echo -e "${GREEN} The directory $DIR already exists.${NC}"
          echo -e "${BLUE}-------------------------------------------------${NC}"
      fi

      echo -e "${GREEN}..done..${NC}"

      ## install end
      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${GREEN}Installation completed...${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"
    container: 'ghcr.io/goover/installers:debian'
    entrypoint: bash
