scripts:
  installation:
    script: |-
      #!/bin/bash
      # steamcmd Base Installation Script
      #
      clear
      RED='\033[0;31m'
      GREEN='\033[0;32m'
      YELLOW='\033[1;33m'
      BLUE='\033[0;34m'
      NC='\033[0m'

      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${YELLOW}Astro Coloyny Installscript${NC}"
      echo -e "${YELLOW}Egg by gOOvER | https://discord.goover.dev${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"

      #apt -y update
      #apt -y --no-install-recommends install curl lib32gcc-s1 ca-certificates jq dos2unix

      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${YELLOW}download and install steamcmd. please wait...${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"

      ## just in case someone removed the defaults.
      if [[ "${STEAM_USER}" == "" ]] || [[ "${STEAM_PASS}" == "" ]]; then
          echo -e "steam user is not set.\n"
          echo -e "Using anonymous user.\n"
          STEAM_USER=anonymous
          STEAM_PASS=""
          STEAM_AUTH=""
      else
          echo -e "user set to ${STEAM_USER}"
      fi

      ## download and install steamcmd
      cd /tmp
      mkdir -p /mnt/server/steamcmd
      curl -sSL -o steamcmd.tar.gz https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
      tar -xzvf steamcmd.tar.gz -C /mnt/server/steamcmd
      mkdir -p /mnt/server/steamapps # Fix steamcmd disk write error when this folder is missing
      cd /mnt/server/steamcmd

      # SteamCMD fails otherwise for some reason, even running as root.
      # This is changed at the end of the install process anyways.
      chown -R root:root /mnt
      export HOME=/mnt/server
      echo -e "${GREEN}..done..${NC}"

      ## install game using steamcmd
      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${YELLOW}install game using steamcmd. please wait...${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"

      ./steamcmd.sh +force_install_dir /mnt/server +login ${STEAM_USER} ${STEAM_PASS} ${STEAM_AUTH} $( [[ "${WINDOWS_INSTALL}" == "1" ]] && printf %s '+@sSteamCmdForcePlatformType windows' ) +app_update 1007 +app_update ${STEAM_APPID} $( [[ -z ${STEAM_BETAID} ]] || printf %s "-beta ${STEAM_BETAID}" ) $( [[ -z ${STEAM_BETAPASS} ]] || printf %s "-betapassword ${STEAM_BETAPASS}" ) ${INSTALL_FLAGS} validate +quit ## other flags may be needed depending on install. looking at you cs 1.6
      echo -e "${GREEN}..done..${NC}"

      ## set up 32 bit libraries
      mkdir -p /mnt/server/.steam/sdk32
      cp -v linux32/steamclient.so ../.steam/sdk32/steamclient.so

      ## set up 64 bit libraries
      mkdir -p /mnt/server/.steam/sdk64
      cp -v linux64/steamclient.so ../.steam/sdk64/steamclient.so

      cp -v $HOME/linux64/steamclient.so ../AstroColony/Binaries/Linux/steamclient.so
      chmod +x ../AstroColony/Binaries/Linux/AstroColonyServer

      mkdir -p $HOME/AstroColony/Saved/Config/LinuxServer
      FILE=$HOME/AstroColony/Saved/Config/LinuxServer/ServerSettings.ini
      if [ -f "$FILE" ]; then
        echo -e "${BLUE}-------------------------------------------------${NC}"
        echo -e "${GREEN}ServerSettings.ini found.${NC}"
        echo -e "${BLUE}-------------------------------------------------${NC}"
      else
        echo -e "${BLUE}-------------------------------------------------${NC}"
        echo -e "${RED}No ServerSettings.ini found. Downloading default...${NC}"
        echo -e "${BLUE}-------------------------------------------------${NC}"
        mkdir -p $HOME/AstroColony/Saved/Config/LinuxServer/
        cd $HOME/AstroColony/Saved/Config/LinuxServer/
        curl -sSL -o ServerSettings.ini https://raw.githubusercontent.com/gsrvtech/gameserver-templates/refs/heads/main/steamcmd-games/astrocolony/config/ServerSettings.ini
      fi

      rm -fr $HOME/AstroColony/Saved/Config/WindowsServer

      echo -e "${GREEN}..done..${NC}"

      ## install end
      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${GREEN}Installation completed...${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"
    container: 'ghcr.io/goover/installers:debian'
    entrypoint: bash
