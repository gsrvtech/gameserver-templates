- name: '[SERVER] Steam Query Port'
  description: 'UDP port for Steam query / server browser. Default: 27016. Must be forwarded if using SteamGameServer auth.'
  env_variable: QUERY_PORT
  default_value: '27016'
  user_viewable: true
  user_editable: true
  rules:
  - required
  - integer
  - 'between:1024,65535'
  sort: 5
- name: '[STEAM] Steam Username'
  description: 'Steam account username. Must own Schedule I (App ID: 3164500).'
  env_variable: STEAM_USER
  default_value: ''
  user_viewable: true
  user_editable: true
  rules:
  - required
  - string
  sort: 6
- name: '[STEAM] Steam Password'
  description: 'Steam account password.'
  env_variable: STEAM_PASS
  default_value: ''
  user_viewable: true
  user_editable: true
  rules:
  - required
  - string
  sort: 7
- name: '[STEAM] Steam App ID'
  description: 'Do not edit!'
  env_variable: STEAM_APPID
  default_value: '3164500'
  user_viewable: false
  user_editable: false
  rules:
  - required
  - 'in:3164500'
  sort: 8
- name: '[STEAM] Windows Install'
  description: ''
  env_variable: WINDOWS_INSTALL
  default_value: '1'
  user_viewable: false
  user_editable: false
  rules:
