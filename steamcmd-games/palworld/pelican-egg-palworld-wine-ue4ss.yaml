scripts:
  installation:
    script: |-
      #!/bin/bash
      # Palworld (Wine + UE4SS) Installscript
      #
      clear
      RED='\033[0;31m'
      GREEN='\033[0;32m'
      YELLOW='\033[1;33m'
      BLUE='\033[0;34m'
      NC='\033[0m'

      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${YELLOW}Palworld (Wine + UE4SS) Installscript${NC}"
      echo -e "${YELLOW}Egg by gOOvER | https://discord.goover.dev${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"

      # Setup
      chown -R root:root /mnt
      export HOME=/mnt/server

      ## download and install steamcmd
      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${YELLOW}download and install steamcmd. please wait...${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"

      cd /tmp
      mkdir -p /mnt/server/steamcmd
      curl -sSL -o steamcmd.tar.gz https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
      tar -xzvf steamcmd.tar.gz -C /mnt/server/steamcmd
      mkdir -p /mnt/server/steamapps
      cd /mnt/server/steamcmd
      echo -e "${GREEN}..done..${NC}"

      ## install game using steamcmd (Windows platform required)
      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${YELLOW}Installing Palworld Windows dedicated server...${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"

      ./steamcmd.sh \
          +force_install_dir /mnt/server \
          +login anonymous \
          +@sSteamCmdForcePlatformType windows \
          +app_update ${STEAM_APPID} validate \
          +quit

      echo -e "${GREEN}..done..${NC}"

      ## set up Steam SDK libraries
      mkdir -p /mnt/server/.steam/sdk32
      cp -v linux32/steamclient.so /mnt/server/.steam/sdk32/steamclient.so 2>/dev/null || true
      mkdir -p /mnt/server/.steam/sdk64
      cp -v linux64/steamclient.so /mnt/server/.steam/sdk64/steamclient.so 2>/dev/null || true

      ## Palworld config
      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${YELLOW}Setting up Palworld config...${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"

      CONFIG_DIR="/mnt/server/Pal/Saved/Config/WindowsServer"
      mkdir -p "${CONFIG_DIR}"

      if [ -f "${CONFIG_DIR}/PalWorldSettings.ini" ]; then
          echo -e "${YELLOW}Config already exists, backing up...${NC}"
          mv "${CONFIG_DIR}/PalWorldSettings.ini" "${CONFIG_DIR}/PalWorldSettings_$(date +"%Y%m%d%H%M%S").ini"
      fi

      if [ -f "/mnt/server/DefaultPalWorldSettings.ini" ]; then
          cp /mnt/server/DefaultPalWorldSettings.ini "${CONFIG_DIR}/PalWorldSettings.ini"
          echo -e "${GREEN}Config copied.${NC}"
      else
          echo -e "${YELLOW}DefaultPalWorldSettings.ini not found, skipping.${NC}"
      fi

      ## UE4SS Installation
      if [ "${INSTALL_UE4SS}" == "1" ]; then
          echo -e "${BLUE}-------------------------------------------------${NC}"
          echo -e "${YELLOW}Installing UE4SS...${NC}"
          echo -e "${BLUE}-------------------------------------------------${NC}"

          UE4SS_DIR="/mnt/server/Pal/Binaries/Win64"
          mkdir -p "${UE4SS_DIR}"

          UE4SS_URL=$(curl -sSL https://api.github.com/repos/UE4SS-RE/RE-UE4SS/releases/latest \
              | grep 'browser_download_url' \
              | grep 'UE4SS_v.*\.zip' \
              | grep -v 'zDEV\|CustomGameConfigs\|MapGenBP' \
              | head -1 \
              | cut -d'"' -f4)

          if [ -z "${UE4SS_URL}" ]; then
              echo -e "${RED}ERROR: Could not find UE4SS download URL!${NC}"
              exit 1
          fi

          echo -e "${YELLOW}Downloading UE4SS from: ${UE4SS_URL}${NC}"
          curl -sSL -o /tmp/ue4ss.zip "${UE4SS_URL}"
          mkdir -p /tmp/ue4ss_extract
          unzip -o /tmp/ue4ss.zip -d /tmp/ue4ss_extract

          cp /tmp/ue4ss_extract/dwmapi.dll "${UE4SS_DIR}/" 2>/dev/null || \
          cp /tmp/ue4ss_extract/*/dwmapi.dll "${UE4SS_DIR}/" 2>/dev/null || true

          cp /tmp/ue4ss_extract/UE4SS.dll "${UE4SS_DIR}/" 2>/dev/null || \
          cp /tmp/ue4ss_extract/*/UE4SS.dll "${UE4SS_DIR}/" 2>/dev/null || true

          cp /tmp/ue4ss_extract/UE4SS-settings.ini "${UE4SS_DIR}/" 2>/dev/null || \
          cp /tmp/ue4ss_extract/*/UE4SS-settings.ini "${UE4SS_DIR}/" 2>/dev/null || true

          if [ -f "${UE4SS_DIR}/UE4SS-settings.ini" ]; then
              sed -i 's/^GuiConsoleEnabled.*/GuiConsoleEnabled = 0/' "${UE4SS_DIR}/UE4SS-settings.ini"
              sed -i 's/^ConsoleEnabled.*/ConsoleEnabled = 0/' "${UE4SS_DIR}/UE4SS-settings.ini"
              sed -i 's/^LogToFile.*/LogToFile = 1/' "${UE4SS_DIR}/UE4SS-settings.ini"
              echo -e "${GREEN}UE4SS settings patched for headless/Wine operation.${NC}"
          fi

          mkdir -p "${UE4SS_DIR}/ue4ss/Mods"
          echo -e "${GREEN}UE4SS installed successfully.${NC}"
      else
          echo -e "${YELLOW}Skipping UE4SS installation (INSTALL_UE4SS != 1).${NC}"
      fi

      ## install end
      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${GREEN}Installation completed!${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"
    container: 'ghcr.io/goover/installers:debian'
    entrypoint: bash
