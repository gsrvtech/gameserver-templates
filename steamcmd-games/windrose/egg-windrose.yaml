scripts:
  installation:
    script: |-
      #!/bin/bash
      # THIS EGG IS LICENCED UNDER AGPLv3
      #
      clear
      RED='\033[0;31m'
      GREEN='\033[0;32m'
      YELLOW='\033[1;33m'
      BLUE='\033[0;34m'
      NC='\033[0m'

      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${YELLOW}Windrose Dedicated Server Installscript (Proton)${NC}"
      echo -e "${YELLOW}Egg by gOOvER (https://discord.goover.dev) | License: AGPLv3${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"

      chown -R root:root /mnt
      export HOME=/mnt/server

      ## Windrose dedicated server supports anonymous Steam login
      if [[ "${STEAM_USER}" == "" ]]; then
          echo -e "${YELLOW}No Steam user set, using anonymous login.${NC}"
          STEAM_USER=anonymous
          STEAM_PASS=""
      else
          echo -e "${YELLOW}Steam user set to ${STEAM_USER}.${NC}"
      fi

      ## download and install steamcmd
      cd /tmp
      mkdir -p /mnt/server/steamcmd
      curl -sSL -o steamcmd.tar.gz https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
      tar -xzvf steamcmd.tar.gz -C /mnt/server/steamcmd
      mkdir -p /mnt/server/steamapps
      cd /mnt/server/steamcmd

      ## install game using steamcmd (Windows dedicated server)
      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${YELLOW}Downloading Windrose via SteamCMD (Windows platform)...${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"

      ./steamcmd.sh \
          +force_install_dir /mnt/server \
          +login ${STEAM_USER} ${STEAM_PASS} \
          +@sSteamCmdForcePlatformType windows \
          +app_update ${SRCDS_APPID} $( [[ -z ${SRCDS_BETAID} ]] || printf %s "-beta ${SRCDS_BETAID}" ) $( [[ -z ${SRCDS_BETAPASS} ]] || printf %s "-betapassword ${SRCDS_BETAPASS}" ) validate \
          +quit

      echo -e "${GREEN}..done..${NC}"

      ## set up Steam SDK libraries
      mkdir -p /mnt/server/.steam/sdk32
      cp -v linux32/steamclient.so /mnt/server/.steam/sdk32/steamclient.so 2>/dev/null || true
      mkdir -p /mnt/server/.steam/sdk64
      cp -v linux64/steamclient.so /mnt/server/.steam/sdk64/steamclient.so 2>/dev/null || true

      ## Create default R5/ServerDescription.json if not present
      mkdir -p /mnt/server/R5
      FILE=/mnt/server/R5/ServerDescription.json
      if [ -f "${FILE}" ]; then
          echo -e "${BLUE}-------------------------------------------------${NC}"
          echo -e "${GREEN}R5/ServerDescription.json already exists. Skipping.${NC}"
          echo -e "${BLUE}-------------------------------------------------${NC}"
      else
          echo -e "${BLUE}-------------------------------------------------${NC}"
          echo -e "${YELLOW}Creating default R5/ServerDescription.json...${NC}"
          echo -e "${BLUE}-------------------------------------------------${NC}"
          cat > "${FILE}" <<'EOF'
      {
          "Version": 1,
          "DeploymentId": "",
          "ServerDescription_Persistent": {
              "PersistentServerId": "",
              "InviteCode": "server1",
              "IsPasswordProtected": false,
              "Password": "",
              "ServerName": "Windrose Server",
              "WorldIslandId": "",
              "MaxPlayerCount": 4,
              "UserSelectedRegion": "",
              "P2pProxyAddress": "0.0.0.0",
              "UseDirectConnection": false,
              "DirectConnectionServerAddress": "",
              "DirectConnectionServerPort": 7777,
              "DirectConnectionProxyAddress": "0.0.0.0",
              "AutoLoadLatestBackupIfHasBroken": true
          }
      }
      EOF
          echo -e "${GREEN}..done..${NC}"
      fi

      ## create start.sh wrapper (invite code extraction)
      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${YELLOW}Creating start.sh wrapper...${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"
      cat > /mnt/server/start.sh <<'STARTSCRIPT'
      #!/bin/bash
      # Windrose server starter – writes invite code to /mnt/server/invite_code.txt

      # Start the Windrose dedicated server
      PROTON_DISABLE_XALIA=1 proton run ./R5/Binaries/Win64/WindroseServer-Win64-Shipping.exe &
      WS_PID=$!

      # Wait for the log file to appear
      while [ ! -f ./R5/Saved/Logs/R5.log ]; do
          sleep 1
      done

      # Read the configured InviteCode from ServerDescription.json and persist it
      if [ -f ./R5/ServerDescription.json ]; then
          CODE=$(grep -oP '"InviteCode"\s*:\s*"\K[^"]+' ./R5/ServerDescription.json 2>/dev/null || true)
          if [ -n "$CODE" ]; then
              echo "$CODE" > /mnt/server/invite_code.txt
              echo "[Windrose] Configured Invite Code: $CODE"
          fi
      fi

      # Background monitor: catch any server-assigned invite / join code from the log
      (
          tail -F ./R5/Saved/Logs/R5.log --pid=$WS_PID | while IFS= read -r line; do
              if echo "$line" | grep -qiE "invite[_ ]?code|join[_ ]?code|server[_ ]?code"; then
                  DYNAMIC=$(echo "$line" | grep -oP '[A-Za-z0-9]{6,32}' | tail -1)
                  if [ -n "$DYNAMIC" ]; then
                      echo "$DYNAMIC" > /mnt/server/invite_code.txt
                      echo "[Windrose] Server Invite Code: $DYNAMIC"
                  fi
              fi
          done
      ) &

      # Forward log to stdout so Pelican detects the startup-done marker
      tail -c0 -F ./R5/Saved/Logs/R5.log --pid=$WS_PID
      STARTSCRIPT
      chmod +x /mnt/server/start.sh
      echo -e "${GREEN}..done..${NC}"

      ## install end
      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${GREEN}Installation completed!${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"
    container: 'ghcr.io/goover/installers:debian'
    entrypoint: bash
