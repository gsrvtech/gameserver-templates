      echo -e "${GREEN}ignore output...${NC}"
      echo -e "${BLUE}-------------------------------------------------${NC}"

      7zz x waste.tar.zst -aoa
      rm -f waste.tar.zst

      chmod +x wastebin

      ## install end
      echo -e "${BLUE}-------------------------------------------------${NC}"
      echo -e "${GREEN}Installation completed...${NC}"
